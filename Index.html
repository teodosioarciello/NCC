<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Email Transfer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #007AFF; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Dati Transfer</h2>
    <input type="text" id="start" placeholder="Origine">
    <input type="text" id="dest" placeholder="Destinazione">
    <input type="date" id="day">
    <input type="time" id="time">
    <input type="text" id="flight" placeholder="Volo">
    
    <button onclick="generateMail()">Genera Email</button>

    <script>
        function generateMail() {
            const start = document.getElementById('start').value;
            const dest = document.getElementById('dest').value;
            const day = document.getElementById('day').value;
            const time = document.getElementById('time').value;
            const flight = document.getElementById('flight').value;

            const subject = `TRANSFER ARCIELLO ${start} - ${dest} - ${day}`;
            
            const body = `Salve,
Dovrei organizzare quanto segue:
Origine : ${start}
Destinazione: ${dest}
Giorno: ${day}
Ora: ${time}
Volo: ${flight}
Pagamento: Fattura

Saluti`;

            // Codifica i caratteri speciali per l'URL
            const mailtoUrl = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            // Apre l'app Mail
            window.location.href = mailtoUrl;
        }
    </script>
</body>
</html>
