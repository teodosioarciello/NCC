<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Email Transfer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        
        /* Stile dei campi di input e dei pulsanti */
        input, button { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box;}
        button { background-color: #007AFF; color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 15px; }
        
        /* Stile delle etichette (Label) per Data e Ora */
        label { font-weight: bold; font-size: 14px; color: #333; display: block; margin-bottom: -5px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Dati Transfer</h2>
    <input type="text" id="start" placeholder="Origine">
    <input type="text" id="dest" placeholder="Destinazione">
    
    <label for="day">Data (Giorno):</label>
    <input type="date" id="day">
    
    <label for="time">Ora:</label>
    <input type="time" id="time">
    
    <input type="text" id="flight" placeholder="Volo">
    
    <button onclick="generateMail()">Genera Email</button>

    <script>
        function generateMail() {
            const start = document.getElementById('start').value || '_StartingPlace';
            const dest = document.getElementById('dest').value || '_DestinationPlace';
            const time = document.getElementById('time').value || '_Time';
            const flight = document.getElementById('flight').value || '_Flight';

            // --- GESTIONE E FORMATTAZIONE DELLA DATA ---
            const rawDate = document.getElementById('day').value;
            let formattedDate = '_Day'; // Valore di default se il campo viene lasciato vuoto
            
            if (rawDate) {
                // rawDate è nel formato "aaaa-mm-gg". Lo divido usando il trattino
                const parts = rawDate.split('-'); 
                // Riordino i pezzi: parts[2] è il giorno, parts[1] il mese, parts[0] l'anno
                formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
            }

            const subject = `TRANSFER ARCIELLO ${start} - ${dest} - ${formattedDate}`;
            
            const body = `Salve,\n\nDovrei organizzare quanto segue:\nOrigine : ${start}\nDestinazione: ${dest}\nGiorno: ${formattedDate}\nOra: ${time}\nVolo: ${flight}\nPagamento: Fattura\n\nSaluti`;

            const mailtoUrl = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            const tempLink = document.createElement('a');
            tempLink.href = mailtoUrl;
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);
        }
    </script>
</body>
</html>
